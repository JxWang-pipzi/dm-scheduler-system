server:
  port: 8081
spring:
  jackson:
    time-zone: Asia/Shanghai
  datasource:
    url: jdbc:mysql://localhost:3306/dm_scheduler?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.dm.entity
  configuration:
    map-underscore-to-camel-case: true

# JWT 配置（生产环境请通过环境变量 JWT_SECRET 设置强密钥）
jwt:
  secret: ${JWT_SECRET:dm-scheduler-default-secret-key-change-in-production}
  expiration: 86400000

# 默认管理员密码（生产环境请通过环境变量 ADMIN_PASSWORD 设置强密码）
admin:
  default-password: ${ADMIN_PASSWORD:admin123}

